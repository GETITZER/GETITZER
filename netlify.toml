[build]
  base    = "website"
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[functions]
  directory = "netlify/functions"

# Pings search engines with the sitemap after every successful deploy.
# Runs onSuccess — a failure here can never block a deploy.
[[plugins]]
  package = "netlify-plugin-submit-sitemap"
  [plugins.inputs]
    baseUrl = "https://www.isavalvesolutions.com"
    sitemapPath = "/sitemap.xml"
    providers = ["bing", "yandex"]

[[redirects]]
  from   = "/api/clerk-webhook"
  to     = "/.netlify/functions/clerk-webhook"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
