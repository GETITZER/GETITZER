[build]
  base    = "website"
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"

[[redirects]]
  from   = "/api/clerk-webhook"
  to     = "/.netlify/functions/clerk-webhook"
  status = 200
  force  = true

[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
